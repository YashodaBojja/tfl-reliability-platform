AWSTemplateFormatVersion: '2010-09-09'
Description: TfL Real-Time Reliability Platform - Phase 1 Infrastructure

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod
    Description: Environment name used for resource naming

  AlertEmail:
    Type: String
    Description: Email address that receives TfL reliability alerts

Resources:

  TfLBronzeBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "tfl-bronze-${AWS::AccountId}-${AWS::Region}-${EnvironmentName}"

      VersioningConfiguration:
        Status: Enabled

      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

      Tags:
        - Key: Project
          Value: TfL-Reliability-Platform
        - Key: Environment
          Value: !Ref EnvironmentName

  TfLLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tfl-lambda-role-${EnvironmentName}"

      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

      Policies:
        - PolicyName: TfLS3WritePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt TfLBronzeBucket.Arn
                  - !Sub "${TfLBronzeBucket.Arn}/*"

        - PolicyName: TfLCloudWatchMetricsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: "*"
                Condition:
                  StringEquals:
                    cloudwatch:namespace: TfL/Reliability

      Tags:
        - Key: Project
          Value: TfL-Reliability-Platform
        - Key: Environment
          Value: !Ref EnvironmentName

  TfLIngestionLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "tfl-ingestion-${EnvironmentName}"
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt TfLLambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 128

      Environment:
        Variables:
          BRONZE_BUCKET_NAME: !Ref TfLBronzeBucket
          TFL_LINE_ID: "244"

      Code:
        ZipFile: |
          import json
          import logging
          import os
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone

          import boto3

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          s3_client = boto3.client("s3")
          cloudwatch_client = boto3.client("cloudwatch")

          def fetch_tfl_arrivals(line_id):
              api_url = f"https://api.tfl.gov.uk/Line/{line_id}/Arrivals"

              request = urllib.request.Request(
                  api_url,
                  headers={
                      "Accept": "application/json",
                      "User-Agent": "tfl-reliability-platform/1.0"
                  }
              )

              with urllib.request.urlopen(
                  request,
                  timeout=15
              ) as response:
                  status_code = response.getcode()
                  response_body = response.read().decode("utf-8")
                  return json.loads(response_body), status_code

          def save_to_s3(
              bucket_name,
              line_id,
              arrival_data,
              api_status_code
          ):
              current_time = datetime.now(timezone.utc)

              object_key = current_time.strftime(
                  f"raw/line-{line_id}/year=%Y/month=%m/day=%d/"
                  f"hour=%H/arrivals-%Y%m%dT%H%M%SZ.json"
              )

              s3_client.put_object(
                  Bucket=bucket_name,
                  Key=object_key,
                  Body=json.dumps(arrival_data),
                  ContentType="application/json",
                  Metadata={
                      "line-id": line_id,
                      "api-status-code": str(api_status_code),
                      "ingested-at": current_time.isoformat()
                  }
              )

              return object_key

          def publish_metrics(
              line_id,
              arrival_data,
              api_success
          ):
              valid_wait_times = []

              for arrival in arrival_data:
                  time_to_station = arrival.get("timeToStation")

                  if isinstance(time_to_station, (int, float)):
                      wait_minutes = time_to_station / 60
                      valid_wait_times.append(wait_minutes)

              metric_data = [
                  {
                      "MetricName": "API_Success",
                      "Dimensions": [
                          {
                              "Name": "LineId",
                              "Value": line_id
                          }
                      ],
                      "Value": api_success,
                      "Unit": "Count"
                  },
                  {
                      "MetricName": "Arrival_Count",
                      "Dimensions": [
                          {
                              "Name": "LineId",
                              "Value": line_id
                          }
                      ],
                      "Value": len(arrival_data),
                      "Unit": "Count"
                  }
              ]

              if valid_wait_times:
                  average_wait_minutes = (
                      sum(valid_wait_times)
                      / len(valid_wait_times)
                  )
                  maximum_wait_minutes = max(valid_wait_times)

                  metric_data.append(
                      {
                          "MetricName": "Delay_Minutes",
                          "Dimensions": [
                              {
                                  "Name": "LineId",
                                  "Value": line_id
                              }
                          ],
                          "Value": average_wait_minutes,
                          "Unit": "None"
                      }
                  )

                  metric_data.append(
                      {
                          "MetricName": "Maximum_Delay_Minutes",
                          "Dimensions": [
                              {
                                  "Name": "LineId",
                                  "Value": line_id
                              }
                          ],
                          "Value": maximum_wait_minutes,
                          "Unit": "None"
                      }
                  )

              cloudwatch_client.put_metric_data(
                  Namespace="TfL/Reliability",
                  MetricData=metric_data
              )

          def publish_failure_metric(line_id):
              cloudwatch_client.put_metric_data(
                  Namespace="TfL/Reliability",
                  MetricData=[
                      {
                          "MetricName": "API_Success",
                          "Dimensions": [
                              {
                                  "Name": "LineId",
                                  "Value": line_id
                              }
                          ],
                          "Value": 0,
                          "Unit": "Count"
                      }
                  ]
              )

          def lambda_handler(event, context):
              bucket_name = os.environ["BRONZE_BUCKET_NAME"]
              line_id = os.environ.get("TFL_LINE_ID", "244")

              logger.info(
                  "Starting TfL ingestion for line %s",
                  line_id
              )

              try:
                  arrival_data, status_code = fetch_tfl_arrivals(
                      line_id
                  )

                  object_key = save_to_s3(
                      bucket_name,
                      line_id,
                      arrival_data,
                      status_code
                  )

                  publish_metrics(
                      line_id,
                      arrival_data,
                      1
                  )

                  logger.info(
                      "Stored %s records in s3://%s/%s",
                      len(arrival_data),
                      bucket_name,
                      object_key
                  )

                  return {
                      "statusCode": 200,
                      "body": json.dumps({
                          "message": "TfL arrival data stored successfully",
                          "line_id": line_id,
                          "records_received": len(arrival_data),
                          "bucket": bucket_name,
                          "object_key": object_key
                      })
                  }

              except Exception as error:
                  logger.exception("TfL ingestion failed")

                  try:
                      publish_failure_metric(line_id)
                  except Exception:
                      logger.exception(
                          "Failed to publish failure metric"
                      )

                  return {
                      "statusCode": 500,
                      "body": json.dumps({
                          "message": "TfL ingestion failed",
                          "error": str(error)
                      })
                  }

      Tags:
        - Key: Project
          Value: TfL-Reliability-Platform
        - Key: Environment
          Value: !Ref EnvironmentName

  TfLIngestionSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "tfl-ingestion-schedule-${EnvironmentName}"
      Description: Triggers the TfL ingestion Lambda every 5 minutes
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt TfLIngestionLambda.Arn
          Id: TfLIngestionLambdaTarget

  TfLPermissionForEventBridge:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TfLIngestionLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt TfLIngestionSchedule.Arn

  TfLAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "tfl-reliability-alerts-${EnvironmentName}"
      DisplayName: TfL Reliability Alerts

      Tags:
        - Key: Project
          Value: TfL-Reliability-Platform
        - Key: Environment
          Value: !Ref EnvironmentName
  
  TfLAlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref TfLAlertTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  TfLMaximumDelayAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "tfl-maximum-delay-over-15-minutes-${EnvironmentName}"

      AlarmDescription: >
        Sends an alert when the maximum predicted TfL arrival wait
        exceeds 15 minutes.

      Namespace: TfL/Reliability
      MetricName: Maximum_Delay_Minutes

      Dimensions:
        - Name: LineId
          Value: "244"

      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1

      Threshold: 15
      ComparisonOperator: GreaterThanThreshold

      TreatMissingData: notBreaching

      AlarmActions:
        - !Ref TfLAlertTopic

      OKActions:
        - !Ref TfLAlertTopic

Outputs:

  BronzeBucketName:
    Description: Name of the S3 Bronze bucket
    Value: !Ref TfLBronzeBucket

  BronzeBucketArn:
    Description: ARN of the S3 Bronze bucket
    Value: !GetAtt TfLBronzeBucket.Arn

  LambdaFunctionName:
    Description: Name of the TfL ingestion Lambda function
    Value: !Ref TfLIngestionLambda

  LambdaRoleArn:
    Description: ARN of the Lambda execution role
    Value: !GetAtt TfLLambdaExecutionRole.Arn

  EventBridgeRuleName:
    Description: Name of the EventBridge schedule rule
    Value: !Ref TfLIngestionSchedule

  EventBridgeRuleArn:
    Description: ARN of the EventBridge schedule rule
    Value: !GetAtt TfLIngestionSchedule.Arn

  AlertTopicArn:
    Description: ARN of the SNS alert topic
    Value: !Ref TfLAlertTopic

  MaximumDelayAlarmName:
    Description: Name of the maximum delay CloudWatch alarm
    Value: !Ref TfLMaximumDelayAlarm